services:
  mysql:
    image: mysql:8.0
    container_name: restfulapi-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: restfulapi
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data:
